services:
  minio:
    image: minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    command: server /data --console-address ":9001"

  jupyter:
    image: jupyter/datascience-notebook
    container_name: jupyter
    ports:
      - "8889:8888"
    volumes:
      - ./jupyter/notebooks:/home/jovyan/work
    environment:
      JUPYTER_TOKEN: "123"
    working_dir: /home/jovyan/work
    command: start-notebook.sh --NotebookApp.token='' --NotebookApp.default_url=/tree/work/seminar_ML_full_script.ipynb

  superset:
    image: apache/superset:2.1.0
    container_name: superset
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: "anykey"
    command: >
      sh -c "
        superset db upgrade &&
        superset init &&
        superset fab create-admin --username admin --firstname Admin --lastname Admin --email admin@example.com --password admin &&
        superset run -h 0.0.0.0 -p 8088
      "
